<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بیسیم خادمین امام شهید</title>
    <!-- لود کردن مستقیم SDK رسمی و پایدار زگوکلاد -->
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.0.0/index.js"></script>
    <style>
        body {
            font-family: Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        select {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        /* دکمه PTT */
        .ptt-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle, #ff3b30 0%, #a30000 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.6);
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.1s;
        }
        .ptt-btn:active {
            transform: scale(0.95);
            background: radial-gradient(circle, #4cd964 0%, #008f11 100%);
            box-shadow: 0 0 30px rgba(76, 217, 100, 0.8);
        }
        .ptt-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .status-active {
            color: #4cd964;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>بیسیم خادمین</h2>
    
    <label for="channelSelect">انتخاب کانال صوتی (۶ کانال):</label>
    <select id="channelSelect" onchange="changeChannel()">
        <option value="room_1">کانال ۱ (عملیاتی)</option>
        <option value="room_2">کانال ۲ (پشتیبانی)</option>
        <option value="room_3">کانال ۳ (مدیریت)</option>
        <option value="room_4">کانال ۴</option>
        <option value="room_5">کانال ۵</option>
        <option value="room_6">کانال ۶</option>
    </select>

    <!-- دکمه فشاری Push-to-Talk -->
    <button class="ptt-btn" id="pttButton" disabled>اتصال...</button>

    <div class="status" id="statusText">در حال اتصال به سرور صوتی...</div>
</div>

<script>
    // اطلاعات کانفیگ زگوکلاد
    const appID = 181152766; 
    const server = "wss://webliveroom181152766-api.coolzcloud.com/ws"; 
    
    // توکنی که از پنل برای userID = bisim ساختی رو اینجا پیست کن
    const token = "04AAAAAGpG10YADOdRrGzGXHZRjf3ZnwCvByu4Kt+hUEvDo1VxoIEMs84Nc9CXkRKEBJsO2zMsgr9L00eeWPBi0YZmgIYK/ANsfrBLnVqkcXH6il6H32lNUuXhQQrz/Zd1K8r+Q88kD6ANVeoEQOwetXzjYc4ezQnvzAC7SbwoK8/LgTCR9iYOxwnQCHgt4K8oSuxF8rSx7wGoGrk9YU8Cs6TMA3gNoUj1e70G+vmZDTmkMTTBfBwS7mkkHuBE0Rv/XbgRMMZrTAE="; 

    // یوزرآیدی ثابت برای هماهنگی کامل با توکن پنل
    const userID = "bisim"; 
    const userName = "پوریا";

    let zg = null;
    let currentRoom = "room_1";
    let isConnected = false;
    let localStream = null;
    let streamID = "stream_bisim_voice"; // شناسه استریم صوتی ما

    // شروع و مقداردهی اولیه SDK
    async function initSDK() {
        try {
            // ۱. ایجاد آبجکت اصلی موتور زگوکلاد
            zg = new ZegoExpressEngine(appID, server);
            
            // ۲. گوش دادن به رویدادهای اضافه یا حذف شدن صدا از کانال
            zg.on('roomStreamUpdate', async (roomID, updateType, streamList) => {
                if (updateType === 'ADD') {
                    for (let stream of streamList) {
                        // صدای دیگران را پخش کن
                        const remoteStream = await zg.startPlayingStream(stream.streamID);
                        const audio = document.createElement('audio');
                        audio.srcObject = remoteStream;
                        audio.autoplay = true;
                        audio.id = "audio_" + stream.streamID;
                        document.body.appendChild(audio);
                    }
                } else if (updateType === 'DELETE') {
                    for (let stream of streamList) {
                        const audio = document.getElementById("audio_" + stream.streamID);
                        if (audio) {
                            audio.srcObject = null;
                            audio.remove();
                        }
                    }
                }
            });

            // ۳. ورود به اتاق (کانال ۱)
            await joinRoom(currentRoom);

            // فعال کردن دکمه بیسیم
            const pttButton = document.getElementById('pttButton');
            pttButton.disabled = false;
            pttButton.innerText = "فشار بده صحبت کن";
            document.getElementById('statusText').innerText = `متصل به کانال ۱. آماده به رزم!`;
            
            // فعال کردن مدیریت کلیک و لمس
            setupPTTEvents(pttButton);

        } catch (error) {
            console.error("خطا در راه‌اندازی زگو:", error);
            document.getElementById('statusText').innerHTML = "<span style='color:#ff3b30;'>خطای اتصال! لطفاً توکن جدید در کد قرار دهید.</span>";
        }
    }

    // ورود به اتاق
    async function joinRoom(roomId) {
        document.getElementById('statusText').innerText = `در حال ورود به کانال ${roomId}...`;
        await zg.loginRoom(roomId, token, { userID, userName }, { userUpdate: true });
        currentRoom = roomId;
        isConnected = true;
    }

    // تغییر کانال صوتی
    async function changeChannel() {
        if (!isConnected || !zg) return;
        
        const newRoom = document.getElementById('channelSelect').value;
        const pttButton = document.getElementById('pttButton');
        
        pttButton.disabled = true;
        document.getElementById('statusText').innerText = "تغییر کانال...";
        
        try {
            // خروج از کانال قبلی
            await zg.logoutRoom(currentRoom);
            // ورود به کانال جدید
            await joinRoom(newRoom);
            
            pttButton.disabled = false;
            document.getElementById('statusText').innerText = `به کانال ${newRoom.replace("room_", "")} منتقل شدید.`;
        } catch (err) {
            console.error("خطا در تغییر کانال:", err);
            document.getElementById('statusText').innerText = "خطا در تغییر کانال!";
        }
    }

    // مدیریت رویدادهای فشردن دکمه (Push-to-Talk)
    function setupPTTEvents(button) {
        // برای موبایل (iOS و Android)
        button.addEventListener('touchstart', startTalking);
        button.addEventListener('touchend', stopTalking);
        
        // برای دسکتاپ
        button.addEventListener('mousedown', startTalking);
        button.addEventListener('mouseup', stopTalking);
    }

    // شروع صحبت کردن
    async function startTalking(e) {
        if (e) e.preventDefault();
        document.getElementById('statusText').innerHTML = "<span class='status-active'>🔴 در حال ارسال صدا (بوق آزاد)...</span>";
        
        try {
            // دریافت دسترسی فقط میکروفون
            localStream = await zg.createStream({
                camera: {
                    audio: true,
                    video: false
                }
            });
            // ارسال صدا
            await zg.startPublishingStream(streamID, localStream);
        } catch (err) {
            console.error("میکروفون فعال نشد:", err);
            document.getElementById('statusText').innerText = "خطا در دسترسی به میکروفون!";
        }
    }

    // قطع صحبت
    async function stopTalking(e) {
        if (e) e.preventDefault();
        document.getElementById('statusText').innerText = "آماده شنیدن (اور)...";
        
        try {
            if (localStream) {
                zg.stopPublishingStream(streamID);
                zg.destroyStream(localStream);
                localStream = null;
            }
        } catch (err) {
            console.error("خطا در قطع استریم:", err);
        }
    }

    // شروع لودینگ پس از بالا آمدن صفحه
    window.onload = initSDK;
</script>

</body>
</html>
